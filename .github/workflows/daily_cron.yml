name: Daily Swing Trader Pipeline

on:
  schedule:
    - cron: "30 13 * * 1-5"   # 13:30 UTC = 19:00 IST, weekdays only
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run the pipeline
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        python src/data_download.py
        python src/features.py
        python src/train_model.py
        python src/generate_signals.py
        BOT_TOKEN=$BOT_TOKEN CHAT_ID=$CHAT_ID python src/notify.py

    - name: Upload daily signals as artifact
      uses: actions/upload-artifact@v4
      with:
        name: today_signals
        path: data/signals/today_signals.csv
